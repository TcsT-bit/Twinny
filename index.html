<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Twins Workshop | EVOLVE HEAVEN</title>
<meta name="theme-color" content="#7C3AED"/>
<style>
  :root{--bg:#050510;--card:rgba(20,20,40,.7);--text:#f5f7ff;--accent:#7C3AED;--accent2:#00F5D4;--danger:#ff4d6d;--muted:#9aa4bf;--warn:#FFB700;--glass:blur(20px);}
  *{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Arial;transition:.2s;-webkit-tap-highlight-color:transparent}
  body{margin:0;color:var(--text);background:radial-gradient(1200px 800px at 20% -10%, #1e1b4b, transparent),var(--bg);padding-bottom:80px}
.wrap{max-width:1200px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid rgba(255,255,255,.1);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border-radius:20px;padding:18px;margin:12px 0;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  h1{margin:0 0 8px;font-size:22px;font-weight:800} h2{margin:0 0 10px;font-size:16px;color:var(--muted);font-weight:600}
  input,button,select,textarea{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.3);color:var(--text);margin:6px 0;font-size:16px;min-height:48px}
  button{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;font-weight:800;cursor:pointer;border:0}
  button:active{transform:scale(.97)}
  button.danger{background:linear-gradient(90deg,var(--danger),#ff2e55)}
  button.ghost{background:transparent;border:1px solid rgba(255,255,255,.2)}
  button.warn{background:linear-gradient(90deg,var(--warn),#ff9d00);color:#000}
.row{display:flex;gap:10px;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);padding:12px 0;flex-wrap:wrap}
.grid{display:grid;gap:12px}
.grid.cols-2{grid-template-columns:1fr 1fr}
.grid.cols-4{grid-template-columns:repeat(2,1fr)} @media(min-width:768px){.grid.cols-4{grid-template-columns:repeat(4,1fr)}}
.pill{font-size:12px;padding:6px 12px;border:1px solid rgba(255,255,255,.15);border-radius:999px;color:var(--muted)}
.hide{display:none}
.logo{font-weight:900;font-size:16px;background:linear-gradient(90deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi{padding:16px;border-radius:16px;background:rgba(255,255,255,.03);text-align:center}
.kpi h3{margin:0;font-size:11px;color:var(--muted);text-transform:uppercase}
.kpi.val{font-size:26px;font-weight:900;margin:6px 0}
.kanban{display:grid;grid-template-columns:1fr;gap:10px} @media(min-width:900px){.kanban{grid-template-columns:repeat(5,1fr)}}
.col{background:rgba(0,0,0,.3);border-radius:14px;padding:10px;min-height:120px}
.card-job{background:rgba(255,255,255,.05);border-radius:10px;padding:10px;margin:6px 0}
canvas{border:1px dashed rgba(255,255,255,.2);border-radius:12px;background:#000;width:100%;height:100px}
.tabs{display:flex;gap:6px;overflow:auto;padding:4px 0;margin:8px 0}
.tab{flex:0 0 auto;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.05);font-size:14px;white-space:nowrap}
.tab.active{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#000;font-weight:800}
.bottomNav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid rgba(255,255,255,.1);backdrop-filter:var(--glass);display:flex;justify-content:space-around;padding:8px 0;z-index:999}
.navBtn{flex:1;text-align:center;font-size:11px;color:var(--muted)}
.navBtn.active{color:var(--accent2);font-weight:800}
.toast{position:fixed;bottom:90px;right:16px;background:var(--card);border:1px solid var(--accent2);padding:12px 16px;border-radius:12px;z-index:999}
.chat{height:200px;overflow:auto;background:rgba(0,0,0,.3);border-radius:12px;padding:10px}
.msg{margin:6px 0;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.05)}
.msg.ai{background:rgba(124,58,237,.15)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="logo">🧬 TWINZ V4.1 HEAVEN</div>
      <div class="pill" id="lockStatus">LOCKED</div>
    </div>
  </div>

  <!-- PIN LOCK -->
  <div id="pinLock" class="card">
    <h1>✨ Welcome CEO</h1>
    <input id="pin" type="password" placeholder="PIN: 1234" value="1234">
    <button onclick="unlock()">Enter Heaven 🚀</button>
    <button class="ghost" onclick="changePin()">Change PIN</button>
  </div>

  <!-- APP -->
  <div id="app" class="hide">
    <!-- LOGIN -->
    <div id="login" class="card">
      <h1>Select Role</h1>
      <select id="role">
        <option value="CEO">CEO - All Access</option>
        <option value="TECHNICIAN">🔧 Technician</option>
        <option value="SALES">💰 Sales</option>
        <option value="RECEPTION">📞 Reception</option>
      </select>
      <input id="email" value="ceo@twinz.com">
      <button onclick="enter()">Enter →</button>
    </div>

    <!-- CEO ALL ACCESS -->
    <div id="CEO" class="hide">
      <div class="card">
        <h1>CEO Command <span class="pill">All Modules</span></h1>
        <div class="tabs" id="ceoTabs">
          <div class="tab active" onclick="showCeoTab('kpi')">KPI</div>
          <div class="tab" onclick="showCeoTab('tech')">Technician</div>
          <div class="tab" onclick="showCeoTab('sales')">Sales</div>
          <div class="tab" onclick="showCeoTab('rec')">Reception</div>
        </div>
        <div id="ceo_kpi">
          <div class="grid cols-4" id="kpiBoard"></div>
          <h2>Job Pipeline</h2>
          <div class="kanban" id="kanban"></div>
          <button onclick="addJob()">+ New Job</button>
          <button onclick="exportPDF()">Export PDF</button>
        </div>
        <div id="ceo_tech" class="hide"></div>
        <div id="ceo_sales" class="hide"></div>
        <div id="ceo_rec" class="hide"></div>
        <button class="danger" onclick="lockApp()">🔒 Lock</button>
      </div>
    </div>

    <!-- TECHNICIAN ADVANCED -->
    <div id="TECHNICIAN" class="hide">
      <div class="card">
        <h1>🔧 Technician Pro</h1>
        <div class="grid cols-2">
          <input id="vin" placeholder="VIN" value="SALWA2TF0HA123456">
          <button onclick="decodeVIN()">Decode</button>
        </div>
        <div id="vinInfo"></div>
        <h2>Advanced DTC Tool</h2>
        <button onclick="scan()">Run Full Scan</button>
        <div id="dtc"></div>
        <h2>Job Cart + Hours</h2>
        <input id="jobHours" type="number" placeholder="Hours 0.5">
        <button onclick="addToCart()">Add to Job Cart</button>
        <div id="jobCart"></div>
        <h2>E-Sign</h2>
        <canvas id="sign"></canvas>
        <div class="grid cols-2"><button onclick="clearSign()">Clear</button><button onclick="saveSign()">Save</button></div>
        <h2>AI Copilot</h2>
        <div class="chat" id="chat"></div>
        <input id="aiQ" placeholder="Ask P0300?">
        <button onclick="askAI()">Ask AI</button>
        <button class="danger" onclick="lockApp()">🔒 Lock</button>
      </div>
    </div>

    <!-- SALES ADVANCED -->
    <div id="SALES" class="hide">
      <div class="card">
        <h1>💰 Sales Pro</h1>
        <input id="partMake" placeholder="Car Make: JLR, BMW, VW">
        <input id="partName" placeholder="Part Name: Oil Filter">
        <textarea id="partDesc" placeholder="Description: OE Spec, 5.0 V8"></textarea>
        <select id="partCat"><option>Engine</option><option>Brakes</option><option>Suspension</option><option>Body</option></select>
        <div class="grid cols-2">
          <input id="partQty" type="number" placeholder="Qty">
          <input id="partPrice" type="number" placeholder="Cost R">
        </div>
        <input id="partMarkup" type="number" placeholder="Markup % 35" value="35">
        <button onclick="addPart()">+ Add Part</button>
        <div id="parts"></div>
        <button class="warn" onclick="payFast()">PayFast Link</button>
        <button class="danger" onclick="lockApp()">🔒 Lock</button>
      </div>
    </div>

    <!-- RECEPTION -->
    <div id="RECEPTION" class="hide">
      <div class="card">
        <h1>📞 Reception</h1>
        <input id="custName" placeholder="Customer Name">
        <input id="custPhone" placeholder="WhatsApp +27">
        <button onclick="newBooking()">Create + WhatsApp</button>
        <div id="bookings"></div>
        <button class="ghost" onclick="copyPortal()">Copy Portal Link</button>
        <button class="danger" onclick="lockApp()">🔒 Lock</button>
      </div>
    </div>
  </div>
</div>
<div class="bottomNav" id="bottomNav" style="display:none">
  <div class="navBtn active" onclick="switchRole('CEO')">CEO</div>
  <div class="navBtn" onclick="switchRole('TECHNICIAN')">Tech</div>
  <div class="navBtn" onclick="switchRole('SALES')">Sales</div>
  <div class="navBtn" onclick="switchRole('RECEPTION')">Rec</div>
</div>
<div id="toastHost"></div>

<script>
  // ============ CRYPTO + PIN = SAME ============
  const DB_SALT_NAME='twinz_salt';let cryptoKey=null;let idleTimer=null;
  async function getKey(p){const e=new TextEncoder();let s=localStorage.getItem(DB_SALT_NAME);if(!s){s=btoa(String.fromCharCode(...crypto.getRandomValues(new Uint8Array(16))));localStorage.setItem(DB_SALT_NAME,s);}const km=await crypto.subtle.importKey('raw',e.encode(p),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:Uint8Array.from(atob(s),c=>c.charCodeAt(0)),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
  async function encrypt(d){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},cryptoKey,new TextEncoder().encode(JSON.stringify(d)));return btoa(String.fromCharCode(...iv,...new Uint8Array(ct)));}
  async function decrypt(s){const r=Uint8Array.from(atob(s),c=>c.charCodeAt(0));const iv=r.slice(0,12);const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},cryptoKey,r.slice(12));return JSON.parse(new TextDecoder().decode(pt));}
  const DB={async get(k){const b=localStorage.getItem(k);if(!b)return[];try{return await decrypt(b);}catch(e){return[];}},async set(k,v){localStorage.setItem(k,await encrypt(v));resetIdle();}};
  window.changePin=async()=>{const p=prompt('New PIN?');if(p&&p.length>=4){localStorage.setItem('twinz_pin_hash',await sha256(p));toast('✅ PIN');lockApp();}}
  async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
  window.unlock=async()=>{const p=document.getElementById('pin').value;const h=await sha256(p);const s=localStorage.getItem('twinz_pin_hash');if(h===s||!s&&p==='1234'){if(!s)localStorage.setItem('twinz_pin_hash',h);cryptoKey=await getKey(p);document.getElementById('pinLock').classList.add('hide');document.getElementById('app').classList.remove('hide');document.getElementById('lockStatus').innerText='UNLOCKED';document.getElementById('bottomNav').style.display='flex';await initData();resetIdle();}else alert('❌ PIN');}
  window.lockApp=()=>{cryptoKey=null;document.getElementById('app').classList.add('hide');document.getElementById('login').classList.remove('hide');document.querySelectorAll('#CEO,#TECHNICIAN,#SALES,#RECEPTION').forEach(e=>e.classList.add('hide'));document.getElementById('pinLock').classList.remove('hide');document.getElementById('lockStatus').innerText='LOCKED';document.getElementById('bottomNav').style.display='none';clearTimeout(idleTimer);}
  function resetIdle(){clearTimeout(idleTimer);idleTimer=setTimeout(lockApp,5*60*1000);}
  ['click','keydown','touchstart'].forEach(e=>document.addEventListener(e,resetIdle));

  // ============ DATA ============
  let users=[],parts=[],bookings=[],jobs=[],jobCart=[],EVOLVE_MEMORY={};
  async function initData(){users=await DB.get('users');if(!users.length)users=[{id:1,email:'tech1@twinz.com'}];parts=await DB.get('parts');if(!parts.length)parts=[{id:1,make:'JLR',name:'Oil Filter',desc:'OE',cat:'Engine',qty:10,price:450,markup:35}];bookings=await DB.get('bookings');jobs=await DB.get('jobs');if(!jobs.length)jobs=[{id:1,car:'Range Rover',status:'Done',time:2.5},{id:2,car:'Defender',status:'In Progress',time:3.2}];EVOLVE_MEMORY=await DB.get('evolve_memory')||{};renderAll();renderKPI();renderKanban();}
  async function saveAll(){await DB.set('users',users);await DB.set('parts',parts);await DB.set('bookings',bookings);await DB.set('jobs',jobs);await DB.set('evolve_memory',EVOLVE_MEMORY);}

  window.enter=()=>{const r=document.getElementById('role').value;document.getElementById('login').classList.add('hide');document.getElementById(r).classList.remove('hide');document.querySelectorAll('.navBtn').forEach((b,i)=>b.classList.toggle('active',i==['CEO','TECHNICIAN','SALES','RECEPTION'].indexOf(r)));if(r==='CEO')loadCeoAll();}

  // ============ CEO ALL ACCESS ============
  function showCeoTab(t){document.querySelectorAll('#ceoTabs .tab').forEach(x=>x.classList.remove('active'));event.target.classList.add('active');['kpi','tech','sales','rec'].forEach(x=>document.getElementById('ceo_'+x).classList.toggle('hide',x!=t));}
  async function loadCeoAll(){renderKPI();renderKanban();document.getElementById('ceo_tech').innerHTML=document.getElementById('TECHNICIAN').innerHTML;document.getElementById('ceo_sales').innerHTML=document.getElementById('SALES').innerHTML;document.getElementById('ceo_rec').innerHTML=document.getElementById('RECEPTION').innerHTML;}
  window.switchRole=(r)=>{document.querySelectorAll('#CEO,#TECHNICIAN,#SALES,#RECEPTION').forEach(e=>e.classList.add('hide'));document.getElementById(r).classList.remove('hide');document.querySelectorAll('.navBtn').forEach(b=>b.classList.toggle('active',b.innerText.toLowerCase().includes(r.toLowerCase().slice(0,3))));if(r==='CEO')loadCeoAll();}

  // ============ KPI + KANBAN ============
  function renderKPI(){const rev=jobs.reduce((a,j)=>a+(j.status=='Done'?j.time*1500:0),0);const avg=(jobs.reduce((a,j)=>a+j.time,0)/jobs.length||0).toFixed(1);const done=jobs.filter(j=>j.status=='Done').length;const eff=Math.max(0,100-(avg*10)).toFixed(0);document.getElementById('kpiBoard').innerHTML=`<div class="kpi"><h3>Revenue</h3><div class="val">R${rev}</div></div><div class="kpi"><h3>Done</h3><div class="val">${done}</div></div><div class="kpi"><h3>Avg</h3><div class="val">${avg}h</div></div><div class="kpi"><h3>Eff</h3><div class="val">${eff}%</div></div>`;}
  function renderKanban(){const cols=['Waiting','In Progress','Awaiting Parts','QC','Done'];document.getElementById('kanban').innerHTML=cols.map(c=>`<div class="col"><h4>${c}</h4>${jobs.filter(j=>j.status==c).map(j=>`<div class="card-job" onclick="moveJob(${j.id})">${j.car}<br><span style="font-size:12px">${j.time}h</span></div>`).join('')}</div>`).join('');}
  window.addJob=async()=>{const car=prompt('Car?');if(car){jobs.push({id:Date.now(),car,status:'Waiting',time:0});await saveAll();renderKanban();renderKPI();toast('✅ Job');}}
  window.moveJob=async(id)=>{const j=jobs.find(x=>x.id==id);const f=['Waiting','In Progress','Awaiting Parts','QC','Done'];j.status=f[(f.indexOf(j.status)+1)%5];await saveAll();renderKanban();renderKPI();}

  // ============ TECHNICIAN ADVANCED ============
  const VIN_DB={'SALWA2TF0HA123456':{make:'Land Rover',model:'Range Rover V8',year:2017,engine:'5.0 SC'}};
  window.decodeVIN=()=>{const v=document.getElementById('vin').value;const d=VIN_DB[v]||{make:'JLR',model:'Vehicle',year:'N/A'};document.getElementById('vinInfo').innerHTML=`<div class="row"><b>${d.year} ${d.make} ${d.model}</b><span>${d.engine||''}</span></div>`;}
  window.scan=async()=>{const code='P0300';const data={code,desc:'Misfire',freeze:{rpm:780,temp:92,load:18}};document.getElementById('dtc').innerHTML=`<div class="row"><span><b>${code}</b> ${data.desc}</span><span>RPM:${data.freeze.rpm} Temp:${data.freeze.temp}°C</span></div>`;EVOLVE_MEMORY[code]={fix:'Coils+Plugs',count:(EVOLVE_MEMORY[code]?.count||0)+1};await saveAll();addMsg('ai',`Learned ${code} x${EVOLVE_MEMORY[code].count}`);}
  window.addToCart=()=>{const h=parseFloat(document.getElementById('jobHours').value)||0;jobCart.push({id:Date.now(),hours:h});renderCart();}
  function renderCart(){const total=jobCart.reduce((a,i)=>a+i.hours,0);document.getElementById('jobCart').innerHTML=`${jobCart.map(i=>`<div class="row"><span>Task</span><span>${i.hours}h</span></div>`).join('')}<div class="row"><b>Total</b><b>${total}h</b></div>`;}
  const c=document.getElementById('sign'),ctx=c.getContext('2d');let drawing=false;c.width=600;c.height=100;c.onpointerdown=e=>{drawing=true;ctx.moveTo(e.offsetX,e.offsetY);}
  c.onpointermove=e=>{if(drawing){ctx.lineTo(e.offsetX,e.offsetY);ctx.strokeStyle='#00F5D4';ctx.lineWidth=2;ctx.stroke();}}
  c.onpointerup=()=>drawing=false;
  window.clearSign=()=>ctx.clearRect(0,0,c.width,c.height);
  window.saveSign=()=>toast('✅ Sign Saved');
  const AI_KB={'p0300':'Misfire JLR V8: Swap coils 1<->5, check plugs.'};
  function addMsg(w,t){document.getElementById('chat').innerHTML+=`<div class="msg ${w}"><b>${w=='ai'?'AI:':'You:'}</b> ${t}</div>`;document.getElementById('chat').scrollTop=9999;}
  window.askAI=()=>{const q=document.getElementById('aiQ').value.toLowerCase();document.getElementById('aiQ').value='';addMsg('you',q);addMsg('ai',AI_KB[q]||'Check guide.');}

  // ============ SALES ADVANCED ============
  window.addPart=async()=>{const make=document.getElementById('partMake').value;const name=document.getElementById('partName').value;const desc=document.getElementById('partDesc').value;const cat=document.getElementById('partCat').value;const qty=+document.getElementById('partQty').value;const price=+document.getElementById('partPrice').value;const markup=+document.getElementById('partMarkup').value||35;if(name&&price){parts.push({id:Date.now(),make,name,desc,cat,qty,price,markup});await saveAll();renderParts();['partMake','partName','partDesc','partQty','partPrice'].forEach(i=>document.getElementById(i).value='');toast('✅ Part');}};
  window.delPart=async(id)=>{parts=parts.filter(p=>p.id!=id);await saveAll();renderParts();};
  window.renderParts=()=>{document.getElementById('parts').innerHTML=parts.map(p=>`<div class="row"><span><b>${p.make} ${p.name}</b><br><span style="font-size:12px">${p.cat} | ${p.desc}</span></span><span>R${Math.round(p.price*(1+p.markup/100))}</span><button class="danger" onclick="delPart(${p.id})">Del</button></div>`).join('')||'<div class="row"><span>No parts</span></div>';};
  window.payFast=()=>{const total=parts.reduce((a,p)=>a+p.price*(1+p.markup/100)*p.qty,0);window.open(`https://sandbox.payfast.co.za/eng/process?amount=${total}&item_name=Twins`,'_blank');toast('💳 PayFast');}

  // ============ RECEPTION ============
  window.newBooking=async()=>{const n=document.getElementById('custName').value;const ph=document.getElementById('custPhone').value;if(n&&ph){bookings.push({id:Date.now(),name:n,phone:ph});document.getElementById('custName').value='';document.getElementById('custPhone').value='';await saveAll();renderBookings();window.open(`https://wa.me/${ph}?text=Hi ${n}, Portal: ${location.href}`,'_blank');toast('✅ WA');}};
  window.renderBookings=()=>{document.getElementById('bookings').innerHTML=bookings.map(b=>`<div class="row"><span>${b.name}</span><span>${b.phone}</span></div>`).join('')||'<div class="row"><span>No bookings</span></div>';};
  window.copyPortal=()=>{navigator.clipboard.writeText(location.href);toast('📋 Copied');}
  window.exportPDF=()=>{const w=window.open('');w.document.write(`<h1>Invoice</h1><p>R${jobs.reduce((a,j)=>a+(j.status=='Done'?j.time*1500:0),0)}</p>`);w.print();}

  function renderAll(){renderParts();renderBookings();}
  function toast(m){const t=document.createElement('div');t.className='toast';t.innerText=m;document.getElementById('toastHost').appendChild(t);setTimeout(()=>t.remove(),2500);}
</script>
</body>
</html>
